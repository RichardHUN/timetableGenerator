<!doctype html>
<html lang="en" data-theme="dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<style>
			:root { color-scheme: dark light; }

			/* Theme variables for light and dark (orange + black accent) */
			html[data-theme="dark"] {
				--bg: #050505;
				--surface: #0f0f10;
				--text: #ffffff;
				--muted: #bfbfbf;
				--accent: #ff8a00; /* orange */
				--accent-2: #ff4d00;
				--button-text: #000000;
			}

			html[data-theme="light"] {
				--bg: #f8f9fa;
				--surface: #ffffff;
				--text: #0b0b0b;
				--muted: #6c757d;
				--accent: #ff7a00;
				--accent-2: #ff4d00;
				--button-text: #ffffff;
			}

			body {
				margin: 0;
				padding: 0;
				background: var(--bg);
				color: var(--text);
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Helvetica Neue', sans-serif;
			}
		</style>
		<!-- Bootstrap CSS -->
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="" crossorigin="anonymous">
		<style>
			/* Bootstrap Theme Overrides - Make Bootstrap respect custom theme variables */
			
			/* Form Controls */
			.form-control, .form-select, input[type="text"], input[type="email"], 
			input[type="password"], input[type="number"], textarea, select {
				background-color: var(--surface) !important;
				color: var(--text) !important;
				border-color: rgba(128, 128, 128, 0.3) !important;
			}

			.form-control:focus, .form-select:focus, input:focus, textarea:focus, select:focus {
				background-color: var(--surface) !important;
				color: var(--text) !important;
				border-color: var(--accent) !important;
				box-shadow: 0 0 0 0.25rem rgba(255, 138, 0, 0.25) !important;
			}

			.form-control::placeholder, input::placeholder, textarea::placeholder {
				color: var(--muted) !important;
				opacity: 0.6 !important;
			}

			/* Labels */
			.form-label, label {
				color: var(--muted) !important;
			}

			/* Muted text utility override to follow theme */
			.text-muted {
				color: var(--muted) !important;
			}

			/* Buttons */
			.btn-primary {
				background-color: var(--accent) !important;
				border-color: var(--accent) !important;
				color: var(--button-text) !important;
			}

			.btn-primary:hover, .btn-primary:focus {
				background-color: var(--accent-2) !important;
				border-color: var(--accent-2) !important;
				color: var(--button-text) !important;
			}

			.btn-outline-secondary {
				color: var(--text) !important;
				border-color: rgba(128, 128, 128, 0.3) !important;
				background: transparent !important;
			}

			.btn-outline-secondary:hover {
				background-color: rgba(128, 128, 128, 0.1) !important;
				border-color: var(--muted) !important;
			}

			.btn-secondary {
				background-color: var(--surface) !important;
				border-color: var(--accent) !important;
				color: var(--accent) !important;
			}

			.btn-secondary:hover {
				background-color: var(--text) !important;
				color: var(--bg) !important;
			}

			/* Light button variants should follow theme variables */
			.btn-light {
				background-color: var(--surface) !important;
				color: var(--text) !important;
				border-color: rgba(128, 128, 128, 0.15) !important;
			}

			.btn-outline-light {
				color: var(--text) !important;
				border-color: rgba(255, 255, 255, 0.15) !important;
				background: transparent !important;
			}

			.btn-outline-light:hover, .btn-outline-light:focus {
				background-color: rgba(255, 255, 255, 0.06) !important;
				color: var(--accent) !important;
			}

			/* Cards & Surfaces */
			.card {
				background-color: var(--surface) !important;
				border-color: rgba(128, 128, 128, 0.2) !important;
				color: var(--text) !important;
			}

			.card-body, .card-header, .card-footer {
				background-color: var(--surface) !important;
				color: var(--text) !important;
			}

			/* Alerts */
			.alert {
				background-color: var(--surface) !important;
				color: var(--text) !important;
				border-color: var(--muted) !important;
			}

			/* Dropdowns */
			.dropdown-menu {
				background-color: var(--surface) !important;
				border-color: rgba(128, 128, 128, 0.2) !important;
			}

			/* List groups (used for Roles list) */
			.list-group-item {
				background-color: var(--surface) !important;
				color: var(--text) !important;
				border-color: rgba(128, 128, 128, 0.08) !important;
			}

			.list-group-flush .list-group-item {
				border-left: none !important;
				border-right: none !important;
				border-radius: 0 !important;
			}

			.dropdown-item {
				color: var(--text) !important;
			}

			.dropdown-item:hover, .dropdown-item:focus {
				background-color: rgba(255, 138, 0, 0.1) !important;
				color: var(--accent) !important;
			}

			/* Navigation */
			.nav-link {
				color: var(--text) !important;
			}

			.nav-link:hover, .nav-link:focus {
				color: var(--accent) !important;
			}

			.navbar-brand {
				color: var(--accent) !important;
			}

			/* Tables */
			.table {
				color: var(--text) !important;
			}

			.table-striped > tbody > tr:nth-of-type(odd) > * {
				color: var(--text) !important;
				background-color: rgba(128, 128, 128, 0.05) !important;
			}

			/* Links */
			a {
				color: var(--accent) !important;
			}

			a:hover {
				color: var(--accent-2) !important;
			}

			/* Modals */
			.modal-content {
				background-color: var(--surface) !important;
				color: var(--text) !important;
			}

			.modal-header, .modal-footer {
				border-color: rgba(128, 128, 128, 0.2) !important;
			}

			/* General text */
			h1, h2, h3, h4, h5, h6, p {
				color: var(--text) !important;
			}

			/* Disabled state */
			.form-control:disabled, .form-select:disabled, 
			input:disabled, textarea:disabled, select:disabled {
				background-color: rgba(128, 128, 128, 0.1) !important;
				color: var(--muted) !important;
				opacity: 0.6 !important;
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<!-- Bootstrap Bundle (includes Popper) -->
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="" crossorigin="anonymous"></script>
	</body>
</html>
